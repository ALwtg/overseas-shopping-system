server:
  port: 9090

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/daigou?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ""  # XAMPP 默认 root 无密码
  # Redis 配置（可选，如未安装可注释掉）
  # redis:
  #   host: localhost
  #   port: 6379
  #   database: 0
  #   timeout: 3000ms
  #   lettuce:
  #     pool:
  #       max-active: 20
  #       max-idle: 10
  #       min-idle: 5

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.daigou.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: daigou-system-jwt-secret-key-for-overseas-purchase-platform-2024
  expiration: 604800000

file:
  upload-path: E:/vscode_workspace/基于 SpringBoot+Vue 的海外物品代购系统的设计与实现/images

# 日志配置
logging:
  level:
    root: INFO
    com.daigou.config: DEBUG
    com.daigou: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
